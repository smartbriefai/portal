name: Deploy SmartBrief AI
on:
  push:
    branches:
      - claude/build-smartbrief-ai-ZcAAG
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/build-smartbrief-ai-ZcAAG
      - name: Inject HF token
        env:
          HF_TOKEN: ${{ secrets.SMB }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: SMB secret is empty or not set"
            exit 1
          fi
          sed -i "s|%%HF_TOKEN%%|${HF_TOKEN}|g" smartbrief-dashboard.html
          echo "Token injection: OK"
          grep -c "hf_" smartbrief-dashboard.html && echo "Token found in file" || echo "WARNING: token pattern not found"
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          exclude_assets: '.github'
          commit_message: "Deploy SmartBrief AI ${{ github.sha }}"
