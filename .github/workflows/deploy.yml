name: Build and Deploy SmartBrief AI
on:
  push:
    branches: [claude/build-smartbrief-ai-ZcAAG]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject HF token into dashboard
        run: |
          sed -i "s|localStorage.getItem('sb_hftoken') || ''|localStorage.getItem('sb_hftoken') || '${{ secrets.SMARTBRIEF }}'|g" smartbrief-dashboard.html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github'
